name: Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [macos-latest, windows-latest, ubuntu-20.04] # todo: switch back to ubuntu-latest when it updates

    runs-on: ${{ matrix.os }}

    steps:
      ## MacOS Setup
      - name: install lazarus (Mac)
        # As of this writing, homebrew's versions aren't working. Manually installing .pkgs instead.
        run: |
          mkdir temp
          cd temp
          wget https://sourceforge.net/projects/freepascal/files/Mac%20OS%20X/3.2.0/fpc-3.2.0.intel-macosx.dmg/download -O fpc.dmg
          7z x fpc.dmg
          sudo installer -pkg fpc-3.2.0.intel-macosx/fpc-3.2.0-intel-macosx.pkg -target /
          wget https://sourceforge.net/projects/lazarus/files/Lazarus%20macOS%20x86-64/Lazarus%202.0.10/Lazarus-2.0.10-x86_64-macosx.pkg/download -O lazarus.pkg
          sudo installer -pkg lazarus.pkg -target /

        if: matrix.os == 'macos-latest'

      ## Linux Setup

      - name: install lazarus (linux)
        run: |
          sudo apt-get update
          sudo apt-get install lazarus
        # 'ubuntu-20.04' currently has lazarus 2.0.6+dfsg-3 .
        # https://help.github.com/en/actions/reference/virtual-environments-for-github-hosted-runners#supported-runners-and-hardware-resources
        # Instead, if desired, specific builds can be installed like this:
        #     sudo apt-get install libgtk2.0-dev
        #     wget https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20amd64%20DEB/Lazarus%202.0.8/fpc-laz_3.0.4-1_amd64.deb/download -O fpc-laz_3.0.4-1_amd64.deb
        #     wget https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20amd64%20DEB/Lazarus%202.0.8/lazarus-project_2.0.8-0_amd64.deb/download -O lazarus-project_2.0.8-0_amd64.deb
        #     wget https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20amd64%20DEB/Lazarus%202.0.8/fpc-src_3.0.4-2_amd64.deb/download -O fpc-src_3.0.4-2_amd64.deb
        #     sudo dpkg -i fpc-laz_3.0.4-1_amd64.deb
        #     sudo dpkg -i fpc-src_3.0.4-2_amd64.deb
        #     sudo dpkg -i lazarus-project_2.0.8-0_amd64.deb

        if: matrix.os == 'ubuntu-20.04'

      ## Windows Setup

      - name: install make (windows)
        if: matrix.os == 'windows-latest'
        uses: crazy-max/ghaction-chocolatey@v1
        with:
          args: install make

      - name: install 32-bit lazarus (windows)
        if: matrix.os == 'windows-latest'
        uses: crazy-max/ghaction-chocolatey@v1
        with:
          args: install --x86 lazarus

      # https://stackoverflow.com/a/64831469
      - name: add lazarus to path (windows)
        run: echo "C:\lazarus" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        if: matrix.os == 'windows-latest'

      ## Build

      - run: lazbuild --version

      - name: fpc version
        run: fpc -iW
        if: matrix.os != 'windows-latest'

      - uses: actions/checkout@v2

      # Building with retries due to intermittent compiler crashes.
      # Mostly on Mac, looking like this:
      #
      # An unhandled exception occurred at $0000000100110B43:
      # EAccessViolation: Access violation
      #   $0000000100110B43
      #   $00000001005C5C95
      #   $00000001005C9BD4
      #   $00000001005CADB6
      #   $000000010001B0E5

      - run: make clean

      - name: make smartset_adv2
        uses: nick-invision/retry@v1
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: make smartset_adv2

      - name: make smartset_master
        uses: nick-invision/retry@v1
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: make smartset_master

      - name: make smartset_fsedge
        uses: nick-invision/retry@v1
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: make smartset_fsedge

      - name: make smartset_savant_elite
        uses: nick-invision/retry@v1
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: make smartset_savant_elite

      - uses: actions/upload-artifact@v1
        with:
          name: SmartSetAdv2-${{ runner.os }}
          path: SmartSetAdv2

      - uses: actions/upload-artifact@v1
        with:
          name: SmartSetMaster-${{ runner.os }}
          path: SmartSetMaster

      - uses: actions/upload-artifact@v1
        with:
          name: SmartSetFSEdgePro-${{ runner.os }}
          path: SmartSetFSEdgePro

      - uses: actions/upload-artifact@v1
        with:
          name: SmartSetSavantElite-${{ runner.os }}
          path: SmartSetSavantElite
